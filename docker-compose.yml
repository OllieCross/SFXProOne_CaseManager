services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sfxproone-app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.casemanager.rule=Host(`sfxproone.olliecross.com`)"
      - "traefik.http.routers.casemanager.entrypoints=websecure"
      - "traefik.http.routers.casemanager.tls.certresolver=letsencrypt"
      - "traefik.http.services.casemanager.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

  postgres:
    image: postgres:17-alpine
    container_name: sfxproone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: sfxproone-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: sfxproone-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_URL}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.sfxproone.olliecross.com`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio.middlewares=minio-cors"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.docker.network=proxy"
      - "traefik.http.middlewares.minio-cors.headers.accesscontrolalloworiginlist=https://sfxproone.olliecross.com"
      - "traefik.http.middlewares.minio-cors.headers.accesscontrolallowmethods=GET,PUT,HEAD,OPTIONS"
      - "traefik.http.middlewares.minio-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Amz-Date,X-Amz-Content-Sha256,X-Amz-Security-Token"
      - "traefik.http.middlewares.minio-cors.headers.accesscontrolexposeheaders=ETag"
      - "traefik.http.middlewares.minio-cors.headers.accesscontrolmaxage=3600"

  postgres-backup:
    image: postgres:17-alpine
    container_name: sfxproone-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    entrypoint: >
      sh -c "
        while true; do
          PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/postgres_$$(date +%Y%m%d_%H%M%S).sql.gz &&
          find /backups -name 'postgres_*.sql.gz' -mtime +7 -delete;
          sleep 86400;
        done
      "
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  redis-backup:
    image: offen/docker-volume-backup:v2
    container_name: sfxproone-redis-backup
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_FILENAME: "redis-backup-%Y-%m-%dT%H-%M-%S.tar.gz"
    volumes:
      - redis_data:/backup/redis_data:ro
      - redis_backups:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

  minio-backup:
    image: offen/docker-volume-backup:v2
    container_name: sfxproone-minio-backup
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_FILENAME: "minio-backup-%Y-%m-%dT%H-%M-%S.tar.gz"
    volumes:
      - minio_data:/backup/minio_data:ro
      - minio_backups:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

volumes:
  postgres_data:
    name: sfxproone_postgres_data
    external: true
  redis_data:
    name: sfxproone_redis_data
    external: true
  minio_data:
    name: sfxproone_minio_data
    external: true
  postgres_backups:
    name: sfxproone_postgres_backups
  redis_backups:
    name: sfxproone_redis_backups
  minio_backups:
    name: sfxproone_minio_backups

networks:
  internal:
    driver: bridge
  proxy:
    external: true
